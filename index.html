  <script>
// Audio
let muted = false;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    if (muted) return;
    try { audioCtx.resume(); } catch(e) {}
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.value = 0.15;
    if (type === 'correct') { o.frequency.value = 523; o.type = 'sine'; o.start(); o.frequency.linearRampToValueAtTime(784, audioCtx.currentTime + 0.15); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3); o.stop(audioCtx.currentTime + 0.3); }
    else if (type === 'wrong') { o.frequency.value = 200; o.type = 'sawtooth'; g.gain.value = 0.08; o.start(); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25); o.stop(audioCtx.currentTime + 0.25); }
    else if (type === 'fanfare') {
        [523,659,784,1047].forEach((f,i) => {
            const osc = audioCtx.createOscillator(); const gn = audioCtx.createGain();
            osc.connect(gn); gn.connect(audioCtx.destination);
            osc.frequency.value = f; osc.type = 'sine'; gn.gain.value = 0.12;
            osc.start(audioCtx.currentTime + i * 0.15);
            gn.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.15 + 0.4);
            osc.stop(audioCtx.currentTime + i * 0.15 + 0.4);
        });
    }
}

document.getElementById('mute-btn').addEventListener('click', () => {
    muted = !muted;
    document.getElementById('mute-icon').setAttribute('data-lucide', muted ? 'volume-x' : 'volume-2');
    lucide.createIcons();
});

// Screen navigation
function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    if (name === 'quiz') startQuiz();
    if (name === 'results') showResults();
}

// DRAG & DROP
let placedCount = 0;
const placedOrgans = new Set();

function initDragDrop() {
    placedCount = 0;
    placedOrgans.clear();
    document.getElementById('activity-score').textContent = '0 / 6 organ terpasang';
    document.getElementById('next-quiz-btn').classList.add('hidden');
    
    document.querySelectorAll('.chip').forEach(c => { c.classList.remove('placed'); c.style.display = ''; });
    document.querySelectorAll('.drop-zone').forEach(z => { z.classList.remove('filled'); z.querySelector('text').textContent = '?'; });
    
    const chips = document.querySelectorAll('.chip');
    chips.forEach(chip => {
        let startX, startY, origLeft, origTop, isDragging = false;
        
        const onStart = (e) => {
            e.preventDefault();
            try { audioCtx.resume(); } catch(er) {}
            isDragging = true;
            const touch = e.touches ? e.touches[0] : e;
            const rect = chip.getBoundingClientRect();
            startX = touch.clientX - rect.left;
            startY = touch.clientY - rect.top;
            origLeft = rect.left;
            origTop = rect.top;
            chip.style.position = 'fixed';
            chip.style.left = rect.left + 'px';
            chip.style.top = rect.top + 'px';
            chip.style.zIndex = '100';
            chip.style.width = rect.width + 'px';
        };
        
        const onMove = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const touch = e.touches ? e.touches[0] : e;
            chip.style.left = (touch.clientX - startX) + 'px';
            chip.style.top = (touch.clientY - startY) + 'px';
            
            document.querySelectorAll('.drop-zone').forEach(z => {
                const svg = document.querySelector('#body-container svg');
                const svgRect = svg.getBoundingClientRect();
                const bbox = z.getBBox();
                const zoneRect = {
                    left: svgRect.left + (bbox.x / 220) * svgRect.width,
                    top: svgRect.top + (bbox.y / 400) * svgRect.height,
                    width: (bbox.width / 220) * svgRect.width,
                    height: (bbox.height / 400) * svgRect.height
                };
                const chipRect = chip.getBoundingClientRect();
                const overlap = !(chipRect.right < zoneRect.left || chipRect.left > zoneRect.left + zoneRect.width || chipRect.bottom < zoneRect.top || chipRect.top > zoneRect.top + zoneRect.height);
                z.classList.toggle('highlight', overlap && !z.classList.contains('filled'));
            });
        };
        
        const onEnd = () => {
            if (!isDragging) return;
            isDragging = false;
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('highlight'));
            
            const chipRect = chip.getBoundingClientRect();
            const organName = chip.dataset.organ;
            let matched = false;
            
            document.querySelectorAll('.drop-zone').forEach(z => {
                if (z.classList.contains('filled')) return;
                const svg = document.querySelector('#body-container svg');
                const svgRect = svg.getBoundingClientRect();
                const bbox = z.getBBox();
                const zoneRect = {
                    left: svgRect.left + (bbox.x / 220) * svgRect.width,
                    top: svgRect.top + (bbox.y / 400) * svgRect.height,
                    width: (bbox.width / 220) * svgRect.width,
                    height: (bbox.height / 400) * svgRect.height
                };
                const overlap = !(chipRect.right < zoneRect.left || chipRect.left > zoneRect.left + zoneRect.width || chipRect.bottom < zoneRect.top || chipRect.top > zoneRect.top + zoneRect.height);
                
                if (overlap && z.dataset.organ === organName) {
                    matched = true;
                    z.classList.add('filled');
                    z.querySelector('text').textContent = '✓';
                    chip.classList.add('placed');
                    chip.style.position = ''; chip.style.zIndex = ''; chip.style.width = '';
                    placedOrgans.add(organName);
                    placedCount = placedOrgans.size;
                    document.getElementById('activity-score').textContent = placedCount + ' / 6 organ terpasang';
                    playSound('correct');
                    z.classList.add('pulse-correct');
                    setTimeout(() => z.classList.remove('pulse-correct'), 600);
                    if (placedCount >= 6) {
                        document.getElementById('next-quiz-btn').classList.remove('hidden');
                        playSound('fanfare');
                    }
                } else if (overlap && z.dataset.organ !== organName) {
                    playSound('wrong');
                    chip.classList.add('shake');
                    setTimeout(() => chip.classList.remove('shake'), 400);
                }
            });
            
            if (!matched) {
                chip.style.position = ''; chip.style.left = ''; chip.style.top = ''; chip.style.zIndex = ''; chip.style.width = '';
            }
        };
        
        chip.addEventListener('mousedown', onStart);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
        chip.addEventListener('touchstart', onStart, { passive: false });
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
    });
}

// QUIZ
const questions = [
    { q: "Organ pencernaan yang pertama kali mencerna makanan adalah...", o: ["Mulut", "Lambung", "Usus halus", "Kerongkongan"], a: 0, e: "Mulut adalah organ pertama yang mencerna makanan secara mekanis (gigi) dan kimiawi (air liur)." },
    { q: "Apa fungsi kerongkongan?", o: ["Menyerap nutrisi", "Menyalurkan makanan ke lambung", "Mencerna lemak", "Menyimpan makanan"], a: 1, e: "Kerongkongan menyalurkan makanan dari mulut ke lambung melalui gerakan peristaltik." },
    { q: "Di organ mana makanan dicerna oleh asam lambung?", o: ["Usus halus", "Usus besar", "Lambung", "Mulut"], a: 2, e: "Lambung menghasilkan asam klorida (HCl) untuk mencerna makanan, terutama protein." },
    { q: "Usus halus berfungsi utama untuk...", o: ["Menyimpan makanan", "Menyerap sari-sari makanan", "Menghancurkan makanan", "Membuang sisa makanan"], a: 1, e: "Usus halus adalah tempat utama penyerapan nutrisi dari makanan ke dalam darah." },
    { q: "Apa yang diserap oleh usus besar?", o: ["Protein", "Lemak", "Air dan garam mineral", "Vitamin A"], a: 2, e: "Usus besar menyerap air dan garam mineral dari sisa makanan sebelum dibuang." },
    { q: "Urutan sistem pencernaan yang benar adalah...", o: ["Mulut → Lambung → Kerongkongan → Usus", "Mulut → Kerongkongan → Lambung → Usus halus → Usus besar", "Lambung → Mulut → Usus → Kerongkongan", "Mulut → Usus halus → Lambung → Usus besar"], a: 1, e: "Urutan yang benar: Mulut → Kerongkongan → Lambung → Usus Halus → Usus Besar → Anus." },
    { q: "Enzim ptialin terdapat di...", o: ["Lambung", "Usus halus", "Air liur (mulut)", "Usus besar"], a: 2, e: "Enzim ptialin ada di air liur dan berfungsi mengubah zat tepung menjadi gula." },
    { q: "Gerakan meremas makanan di kerongkongan disebut...", o: ["Peristaltik", "Mekanik", "Kimiawi", "Absorpsi"], a: 0, e: "Gerak peristaltik adalah gerakan meremas-remas yang mendorong makanan sepanjang saluran pencernaan." },
    { q: "Sisa pencernaan dikeluarkan melalui...", o: ["Mulut", "Lambung", "Usus halus", "Anus"], a: 3, e: "Anus adalah lubang akhir saluran pencernaan tempat sisa makanan (feses) dikeluarkan." },
    { q: "Gigi yang berfungsi untuk merobek makanan adalah...", o: ["Gigi seri", "Gigi taring", "Gigi geraham", "Gigi susu"], a: 1, e: "Gigi taring berbentuk runcing dan berfungsi untuk merobek makanan." }
];

let currentQ = 0, quizScore = 0, shuffledQs = [];

function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

function startQuiz() {
    currentQ = 0; quizScore = 0;
    shuffledQs = shuffle(questions);
    renderQuestion();
}

function renderQuestion() {
    const q = shuffledQs[currentQ];
    const container = document.getElementById('quiz-container');
    document.getElementById('quiz-explanation').classList.add('hidden');
    document.getElementById('quiz-progress-text').textContent = `Soal ${currentQ + 1} dari 10`;
    document.getElementById('quiz-progress-bar').style.width = ((currentQ + 1) / 10 * 100) + '%';
    
    const indices = shuffle([0, 1, 2, 3]);
    container.innerHTML = `
        <div class="p-6 rounded-2xl shadow-lg" style="background:rgba(255,255,255,0.95);">
            <p class="text-lg font-bold mb-5" style="color:#1e1b4b;">${q.q}</p>
            <div class="grid gap-3">
                ${indices.map(i => `<button class="quiz-option p-4 rounded-xl text-left font-medium border-2" style="background:#f5f3ff;border-color:#c4b5fd;color:#4c1d95;" onclick="selectAnswer(${i}, this)">${q.o[i]}</button>`).join('')}
            </div>
        </div>
    `;
}

function selectAnswer(idx, btn) {
    const q = shuffledQs[currentQ];
    const btns = document.querySelectorAll('.quiz-option');
    btns.forEach(b => b.classList.add('disabled'));
    
    if (idx === q.a) {
        btn.classList.add('correct');
        quizScore += 10;
        playSound('correct');
    } else {
        btn.classList.add('wrong');
        btns.forEach(b => { if (parseInt(b.getAttribute('onclick').match(/\d+/)[0]) === q.a) b.classList.add('correct'); });
        playSound('wrong');
    }
    
    const exp = document.getElementById('quiz-explanation');
    exp.innerHTML = `<strong>💡 Penjelasan:</strong> ${q.e}`;
    exp.classList.remove('hidden');
    
    setTimeout(() => {
        currentQ++;
        if (currentQ < 10) renderQuestion();
        else showScreen('results');
    }, 2200);
}

function showResults() {
    const stars = quizScore >= 80 ? 3 : quizScore >= 50 ? 2 : 1;
    const container = document.getElementById('stars-container');
    container.innerHTML = '';
    for (let i = 0; i < 3; i++) {
        const s = document.createElement('span');
        s.textContent = i < stars ? '⭐' : '☆';
        s.className = 'star-pop';
        s.style.animationDelay = (i * 0.2) + 's';
        s.style.opacity = i < stars ? '1' : '0.3';
        container.appendChild(s);
    }
    document.getElementById('score-display').textContent = quizScore + ' / 100';
    
    const msg = document.getElementById('results-msg');
    if (quizScore >= 80) msg.textContent = '🎉 Luar biasa! Kamu sangat paham sistem pencernaan!';
    else if (quizScore >= 50) msg.textContent = '👍 Bagus! Terus belajar ya!';
    else msg.textContent = '💪 Jangan menyerah! Coba lagi ya!';
    
    if (stars === 3) playSound('fanfare');
}

function resetGame() {
    showScreen('welcome');
    initDragDrop();
}

// Init
document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    initDragDrop();
});
